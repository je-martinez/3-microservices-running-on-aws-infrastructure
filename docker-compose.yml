# 3MRAI local development orchestrator.
# Ministack emulates AWS locally (SQS, Lambda, ECS, RDS, S3, DocumentDB, …) —
# it is where the project's AWS resources are created for local dev. The four
# services run on one network with docker-watch (live reload) and point their
# AWS SDKs at Ministack via AWS_ENDPOINT_URL.
# Skeleton: service build contexts use per-service skeleton Dockerfiles; real
# per-service config (ports, depends-on details, healthchecks) is filled in per
# service milestone.
name: 3mrai

networks:
  3mrai-network:
    driver: bridge

services:
  # ── Ministack DISABLED for the Floci spike (2026-06-29) ──────────────────────
  # Superseded locally by the `floci` service below (`floci` on :4566). Kept
  # commented (not deleted) so we can revert if the Floci spike does not pass.
  # See docs/superpowers/specs/2026-06-29-floci-local-emulator-spike-design.md
  #
  # Local AWS emulator. Lambda/ECS run as real Docker containers, so it needs
  # the docker socket. State and S3 data persist under ./data (git-ignored).
  # LAMBDA_DOCKER_NETWORK must be the real compose network name so Lambda
  # containers join the same network: "<project>_<network>" = 3mrai_3mrai-network.
  # ministack:
  #   # Pinned to a specific version for reproducibility (not :latest).
  #   # -full (Debian) bundles DuckDB/psycopg2/pymysql for the real Aurora
  #   # Postgres/MySQL containers Ministack runs to emulate RDS.
  #   image: ministackorg/ministack:1.3.69-full
  #   ports:
  #     - "4566:4566"
  #   environment:
  #     - PERSIST_STATE=1
  #     - S3_PERSIST=1
  #     - RDS_PERSIST=1
  #     - LOG_LEVEL=INFO
  #     - LAMBDA_EXECUTOR=docker
  #     - LAMBDA_DOCKER_NETWORK=3mrai_3mrai-network
  #   volumes:
  #     - ./data/state:/tmp/ministack-state
  #     - ./data/s3:/tmp/ministack-data/s3
  #     - /var/run/docker.sock:/var/run/docker.sock
  #   networks: [3mrai-network]
  #   healthcheck:
  #     test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4566/_ministack/health')"]
  #     interval: 10s
  #     timeout: 3s
  #     retries: 3

  # Local AWS emulator (Floci spike, 2026-06-29) — replaces Ministack on :4566.
  # MIT, single-port emulator. Launches ECS tasks as real Docker containers and
  # joins them to the compose network via FLOCI_SERVICES_ECS_DOCKER_NETWORK, so the
  # Nginx ECS task resolves `spike-backend` by container_name through Docker DNS.
  # Start the spike with:
  #   docker compose up -d floci spike-backend
  floci:
    image: floci/floci:latest
    ports:
      - "4566:4566"
    environment:
      # ECS tasks launched by Floci join the compose network and can resolve
      # other compose containers (spike-backend) by container_name via Docker DNS.
      - FLOCI_SERVICES_ECS_DOCKER_NETWORK=3mrai_3mrai-network
      # Persist state across restarts under ./data/floci (git-ignored).
      - FLOCI_STORAGE_MODE=persistent
      - FLOCI_STORAGE_PERSISTENT_PATH=/app/data
    volumes:
      - ./data/floci:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks: [3mrai-network]
    healthcheck:
      # The floci image ships curl (Quarkus app on :4566).
      test: ["CMD", "curl", "-fsS", "http://localhost:4566/"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Temporary spike backend for JE-25 auth-chain spike.
  # Simulates the "users" service before it is implemented.
  # Runs hashicorp/http-echo returning "spike-ok-via-floci" on port 8080.
  # Nginx (ECS task in Floci) proxies to this service by name via Docker DNS.
  # container_name fixes the Docker DNS name the Nginx ECS task proxies to.
  # TODO(JE-25): remove once the real `users` service fully replaces it and
  # the Nginx ECS task is pointed at `users:3000`.
  spike-backend:
    image: hashicorp/http-echo:latest
    container_name: spike-backend
    command: ["-listen=:8080", "-text=spike-ok-via-floci"]
    networks: [3mrai-network]

  # Real Users service (Fastify + Prisma).
  # Build context is the REPO ROOT so pnpm-lock.yaml and pnpm-workspace.yaml
  # are available to the multi-stage Dockerfile.
  # The container is reachable as `users` on 3mrai-network so the Nginx ECS
  # task can proxy_pass to http://users:3000 via Docker embedded DNS.
  #
  # DATABASE_WRITER_URL / DATABASE_READER_URL / COGNITO_USER_POOL_ID /
  # COGNITO_CLIENT_ID are provided by JE-36's bootstrap/.env after
  # `terraform apply` in infra/environments/local outputs those values.
  users:
    build:
      context: .
      dockerfile: services/users/Dockerfile
    networks: [3mrai-network]
    ports:
      - "3000:3000"
    # depends_on ministack disabled for the Floci spike (2026-06-29).
    # depends_on:
    #   ministack:
    #     condition: service_healthy
    environment:
      - AWS_ENDPOINT_URL=http://ministack:4566
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - PORT=3000
      # Aurora writer/reader endpoints — Ministack emulates RDS on the same host.
      # Replace these with real terraform outputs once JE-36 bootstrap runs.
      - DATABASE_WRITER_URL=postgres://test:test@ministack:4566/users
      - DATABASE_READER_URL=postgres://test:test@ministack:4566/users
      # Cognito pool/client IDs come from `terraform output` (JE-36 bootstrap).
      - COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID}
      - COGNITO_CLIENT_ID=${COGNITO_CLIENT_ID}
      - E2E_TESTING_ENABLED=true
    develop:
      watch:
        - action: sync
          path: ./services/users/src
          target: /app/services/users/src

  orders:
    build: ./services/orders
    networks: [3mrai-network]
    # depends_on ministack disabled for the Floci spike (2026-06-29).
    # depends_on:
    #   ministack:
    #     condition: service_healthy
    environment:
      - AWS_ENDPOINT_URL=http://ministack:4566
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    develop:
      watch:
        - action: sync
          path: ./services/orders/src
          target: /app/src

  tracking:
    build: ./services/tracking
    networks: [3mrai-network]
    # depends_on ministack disabled for the Floci spike (2026-06-29).
    # depends_on:
    #   ministack:
    #     condition: service_healthy
    environment:
      - AWS_ENDPOINT_URL=http://ministack:4566
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    develop:
      watch:
        - action: sync
          path: ./services/tracking/src
          target: /app/src

  events-pipeline:
    build: ./services/events-pipeline
    networks: [3mrai-network]
    # depends_on ministack disabled for the Floci spike (2026-06-29).
    # depends_on:
    #   ministack:
    #     condition: service_healthy
    environment:
      - AWS_ENDPOINT_URL=http://ministack:4566
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    develop:
      watch:
        - action: sync
          path: ./services/events-pipeline/src
          target: /app/src
