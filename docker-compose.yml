# 3MRAI local development orchestrator.
# Floci emulates AWS locally (SQS, Lambda, ECS, RDS, S3, DocumentDB, …) on a
# single port :4566 — it is where the project's AWS resources are created for
# local dev. The four services run on one network with docker-watch (live
# reload) and point their AWS SDKs at Floci via AWS_ENDPOINT_URL.
# Skeleton: service build contexts use per-service skeleton Dockerfiles; real
# per-service config (ports, depends-on details, healthchecks) is filled in per
# service milestone.
name: 3mrai

networks:
  3mrai-network:
    driver: bridge

services:
  # Local AWS emulator (ADR-0017) — replaced Ministack on :4566.
  # MIT, single-port emulator. Launches ECS tasks as real Docker containers and
  # joins them to the compose network via FLOCI_SERVICES_ECS_DOCKER_NETWORK, so the
  # Nginx ECS task resolves `users` by service name through Docker DNS.
  floci:
    image: floci/floci:latest
    ports:
      - "4566:4566"
    environment:
      # ECS tasks launched by Floci join the compose network and can resolve
      # other compose containers (users) by service name via Docker DNS.
      - FLOCI_SERVICES_ECS_DOCKER_NETWORK=3mrai_3mrai-network
      # Persist state across restarts under ./data/floci (git-ignored).
      # `persistent` flushes on every write; `hybrid` batches on a 5s async timer
      # and loses writes on an unclean stop — do not "optimize" this to hybrid.
      # See docs/lessons/floci-storage-modes-and-tmp-corruption.md
      - FLOCI_STORAGE_MODE=persistent
      - FLOCI_STORAGE_PERSISTENT_PATH=/app/data
    volumes:
      - ./data/floci:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks: [3mrai-network]
    healthcheck:
      # The floci image ships curl (Quarkus app on :4566).
      test: ["CMD", "curl", "-fsS", "http://localhost:4566/"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Observability (opt-in): `docker compose --profile observability up` ──
  # OTel collector: fluentd from the compose services + CloudWatch (ECS/RDS) on
  # Floci, exported to self-hosted SigNoz. Pinned image; do not use :latest.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.156.0
    profiles: [observability]
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    ports:
      - "24224:24224"   # fluent_forward — published so the Docker daemon (host) can reach it
    environment:
      - AWS_ENDPOINT_URL=http://floci:4566
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - SIGNOZ_OTLP_ENDPOINT=signoz-otel-collector:4317
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    networks: [3mrai-network]
    depends_on:
      floci:
        condition: service_healthy

  # Real Users service (Fastify + Prisma).
  # Build context is the REPO ROOT so pnpm-lock.yaml and pnpm-workspace.yaml
  # are available to the multi-stage Dockerfile.
  # The container is reachable as `users` on 3mrai-network so the Nginx ECS
  # task can proxy_pass to http://users:3000 via Docker embedded DNS.
  #
  # COGNITO_USER_POOL_ID / COGNITO_CLIENT_ID come from ./.env, which
  # `make infra-up` regenerates from `terraform output` after every apply —
  # Floci mints new IDs on each apply, so they must never be hardcoded here.
  users:
    build:
      context: .
      dockerfile: services/users/Dockerfile
    networks: [3mrai-network]
    ports:
      - "3000:3000"
    depends_on:
      floci:
        condition: service_healthy
    environment:
      - AWS_ENDPOINT_URL=http://floci:4566
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - PORT=3000
      # Floci fronts the real Postgres container it launches for the Aurora
      # cluster on its own proxy port 7001. Reach it by the compose service name
      # `floci` — the container's IP is reassigned on every recreation, and the
      # RDS `Endpoint` reported by describe-db-clusters is one of those IPs.
      #
      # Writer and reader are the SAME endpoint locally: Floci does not emulate
      # an Aurora read replica. ADR-0006 splits reads/writes in production; the
      # split is preserved in code (two URLs) so the app path stays identical.
      #
      # Credentials are the cluster superuser (test/test). The least-privilege
      # `users_app` role that bootstrap.sh creates has a generated password kept
      # in the git-ignored .app-db-secret, which compose cannot read.
      - DATABASE_WRITER_URL=postgres://test:test@floci:7001/users
      - DATABASE_READER_URL=postgres://test:test@floci:7001/users
      - COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID}
      - COGNITO_CLIENT_ID=${COGNITO_CLIENT_ID}
      - E2E_TESTING_ENABLED=true
      # Guards POST /v1/webhooks/cognito. Local-only value: the endpoint is not
      # exposed outside the compose network. Prod reads this from Secrets
      # Manager (ADR-0007) — see the separate infra issue.
      - WEBHOOK_SECRET=local-dev-secret
    develop:
      watch:
        - action: sync
          path: ./services/users/src
          target: /app/services/users/src

  orders:
    build: ./services/orders
    networks: [3mrai-network]
    depends_on:
      floci:
        condition: service_healthy
    environment:
      - AWS_ENDPOINT_URL=http://floci:4566
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    develop:
      watch:
        - action: sync
          path: ./services/orders/src
          target: /app/src

  tracking:
    build: ./services/tracking
    networks: [3mrai-network]
    depends_on:
      floci:
        condition: service_healthy
    environment:
      - AWS_ENDPOINT_URL=http://floci:4566
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    develop:
      watch:
        - action: sync
          path: ./services/tracking/src
          target: /app/src

  events-pipeline:
    build: ./services/events-pipeline
    networks: [3mrai-network]
    depends_on:
      floci:
        condition: service_healthy
    environment:
      - AWS_ENDPOINT_URL=http://floci:4566
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    develop:
      watch:
        - action: sync
          path: ./services/events-pipeline/src
          target: /app/src
