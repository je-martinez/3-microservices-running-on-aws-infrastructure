# 3MRAI local development orchestrator.
# Floci emulates AWS locally (SQS, Lambda, ECS, RDS, S3, DocumentDB, …) on a
# single port :4566 — it is where the project's AWS resources are created for
# local dev. The four services run on one network with docker-watch (live
# reload) and point their AWS SDKs at Floci via AWS_ENDPOINT_URL.
# Skeleton: service build contexts use per-service skeleton Dockerfiles; real
# per-service config (ports, depends-on details, healthchecks) is filled in per
# service milestone.
name: 3mrai

networks:
  3mrai-network:
    driver: bridge

services:
  # Local AWS emulator (ADR-0017) — replaced Ministack on :4566.
  # MIT, single-port emulator. Launches ECS tasks as real Docker containers and
  # joins them to the compose network via FLOCI_SERVICES_ECS_DOCKER_NETWORK, so the
  # Nginx ECS task resolves `users` by service name through Docker DNS.
  floci:
    image: floci/floci:latest
    ports:
      - "4566:4566"
      # RDS proxy ports (7000-7010): Floci assigns one per cluster at apply time
      # in the 7000-7099 range, BY CREATION ORDER — which is NOT stable across
      # applies, so Postgres/MySQL can flip between 7001/7002. The actual per-
      # engine ports are DISCOVERED from describe-db-clusters (Engine per cluster)
      # by scripts/discover-db-port.sh and written into .env as USERS_DB_PORT /
      # ORDERS_DB_PORT — never hardcoded. Published to the host so host-side
      # clients — the phase-2 post-effects Terraform postgresql/mysql providers,
      # and any SQL client — can reach the DBs at localhost:<port>. In-network
      # containers still use floci:<port>.
      - "7000-7010:7000-7010"
    environment:
      # ECS tasks launched by Floci join the compose network and can resolve
      # other compose containers (users) by service name via Docker DNS.
      - FLOCI_SERVICES_ECS_DOCKER_NETWORK=3mrai_3mrai-network
      # Persist state across restarts under ./data/floci (git-ignored).
      # `persistent` flushes on every write; `hybrid` batches on a 5s async timer
      # and loses writes on an unclean stop — do not "optimize" this to hybrid.
      # See docs/lessons/floci-storage-modes-and-tmp-corruption.md
      - FLOCI_STORAGE_MODE=persistent
      - FLOCI_STORAGE_PERSISTENT_PATH=/app/data
    volumes:
      - ./data/floci:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks: [3mrai-network]
    healthcheck:
      # The floci image ships curl (Quarkus app on :4566).
      test: ["CMD", "curl", "-fsS", "http://localhost:4566/"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Observability (opt-in): `docker compose --profile observability up` ──
  # OTel collector: fluentd from the compose services + CloudWatch (ECS/RDS) on
  # Floci, exported to self-hosted OpenObserve. Pinned image; do not use :latest.
  # Trace backend. Logs live in OpenObserve; traces live here, joined by the
  # trace_id every log line carries. See ADR-0019 for why traces are not in
  # OpenObserve: its ingest rejected the collector's OTLP batches with HTTP 400,
  # and ADR-0018 had already flagged its APM maturity as the weak spot to
  # re-evaluate if tracing became a hard requirement. It did.
  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    profiles: [observability]
    ports:
      - "16686:16686"   # Jaeger UI — the waterfall view
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks: [3mrai-network]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.156.0
    profiles: [observability]
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    ports:
      - "24224:24224"   # fluent_forward — published so the Docker daemon (host) can reach it
      # OTLP trace ingest. The services reach it in-network at
      # http://otel-collector:4318, so publishing is only for host-side probing.
      # NOTE: this service sits behind `profiles: [observability]`, so a plain
      # `docker compose up` does NOT start it and the SDKs' exports fail with
      # connection refused — harmless by design, but it means traces only flow
      # when the stack is brought up with the observability profile enabled.
      - "4317:4317"     # OTLP/gRPC
      - "4318:4318"     # OTLP/HTTP
    environment:
      - AWS_ENDPOINT_URL=http://floci:4566
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      # base64("admin@3mrai.local:Complexpass#123") — the OpenObserve Basic auth
      # header value. Local dev only; prod injects this from Secrets Manager.
      - O2_BASIC_AUTH=YWRtaW5AM21yYWkubG9jYWw6Q29tcGxleHBhc3MjMTIz
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    networks: [3mrai-network]
    depends_on:
      floci:
        condition: service_healthy

  # OpenObserve: single-binary logs backend (ADR-0018). Behind the observability
  # profile like the collector. Pinned image; do not use :latest. Local dev creds
  # only — prod reads them from Secrets Manager (ADR-0007).
  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:v0.91.1
    profiles: [observability]
    environment:
      - ZO_ROOT_USER_EMAIL=admin@3mrai.local
      - ZO_ROOT_USER_PASSWORD=Complexpass#123
    ports:
      - "5080:5080"   # UI + OTLP HTTP ingest
    volumes:
      - ./data/openobserve:/data
    networks: [3mrai-network]

  # Real Users service (Fastify + Prisma).
  # Build context is the REPO ROOT so pnpm-lock.yaml and pnpm-workspace.yaml
  # are available to the multi-stage Dockerfile.
  # The container is reachable as `users` on 3mrai-network so the Nginx ECS
  # task can proxy_pass to http://users:3000 via Docker embedded DNS.
  #
  # COGNITO_USER_POOL_ID / COGNITO_CLIENT_ID come from ./.env, which
  # `make infra-up` regenerates from `terraform output` after every apply —
  # Floci mints new IDs on each apply, so they must never be hardcoded here.
  users:
    build:
      context: .
      dockerfile: services/users/Dockerfile
    networks: [3mrai-network]
    ports:
      - "3000:3000"
      # gRPC surface (GetUserById). Reachable as `users:50051` on the network so
      # the Orders service can resolve identity. Guarded by the x-api-key interceptor.
      - "50051:50051"
    depends_on:
      floci:
        condition: service_healthy
    environment:
      - AWS_ENDPOINT_URL=http://floci:4566
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - PORT=3000
      - GRPC_PORT=50051
      # OTLP trace export (see src/shared/observability/tracing.ts). The
      # collector's OTLP receiver is added in JE-76; until then the SDK simply
      # fails to export, which is non-fatal by design — telemetry must never
      # take the service down.
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      # Shared symmetric key for inter-service gRPC auth. Local-only value; the
      # Orders service MUST use the same value. Prod reads it from Secrets Manager.
      - GRPC_API_KEY=local-dev-grpc-key
      # Floci fronts the real Postgres container it launches for the Aurora
      # cluster on its own RDS proxy port. Reach it by the compose service name
      # `floci` — the container's IP is reassigned on every recreation, and the
      # RDS `Endpoint` reported by describe-db-clusters is one of those IPs.
      #
      # USERS_DB_PORT is DISCOVERED per-engine and written into .env by
      # `make env-file` (Floci assigns proxy ports 7000-7099 by creation order,
      # so postgres/mysql can flip across applies — never hardcode 7001). The
      # ${USERS_DB_PORT:-7001} default only applies when .env has not been
      # generated yet; after bootstrap the discovered value wins.
      #
      # Writer and reader are the SAME endpoint locally: Floci does not emulate
      # an Aurora read replica. ADR-0006 splits reads/writes in production; the
      # split is preserved in code (two URLs) so the app path stays identical.
      #
      # Credentials are the cluster superuser (test/test). The least-privilege
      # `users_app` role that phase-2 creates has a generated password kept
      # in Secrets Manager, which compose cannot read.
      - DATABASE_WRITER_URL=postgres://test:test@floci:${USERS_DB_PORT:-7001}/users
      - DATABASE_READER_URL=postgres://test:test@floci:${USERS_DB_PORT:-7001}/users
      - COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID}
      - COGNITO_CLIENT_ID=${COGNITO_CLIENT_ID}
      - E2E_TESTING_ENABLED=true
      # Guards POST /v1/webhooks/cognito. Local-only value: the endpoint is not
      # exposed outside the compose network. Prod reads this from Secrets
      # Manager (ADR-0007) — see the separate infra issue.
      - WEBHOOK_SECRET=local-dev-secret
    # stdout → the observability collector's fluent_forward receiver.
    # localhost:24224 because the Docker daemon resolves fluentd-address from the
    # HOST, not this network. fluentd-async so the service still starts when the
    # observability profile (and thus the collector) is not running.
    logging:
      driver: fluentd
      options:
        fluentd-address: "localhost:24224"
        fluentd-async: "true"
        tag: "users"
    develop:
      watch:
        # Users runs the compiled production build (runtime stage → node
        # dist/server.js), NOT `tsx watch`, so a source sync would copy the .ts
        # files but the process keeps running the old dist/. `rebuild` reconstructs
        # the image on a source change so the new code actually runs. Requires
        # `docker compose watch` to be active.
        - action: rebuild
          path: ./services/users/src

  # Orders service (.NET Core 10 Minimal API, Clean Architecture + EF Core/MySQL).
  # Build context is the REPO ROOT so the shared gRPC contract (proto/users.proto)
  # is inside the build context — Grpc.Tools generates the Users client from it.
  # Reachable as `orders` on 3mrai-network; resolves caller identity by calling
  # the Users gRPC server at users:50051 (guarded by the shared x-api-key).
  orders:
    build:
      context: .
      dockerfile: services/orders/Dockerfile
    networks: [3mrai-network]
    ports:
      # Host 3001 → container 8080 (ASPNETCORE_URLS). Health: GET /v1/health.
      - "3001:8080"
    depends_on:
      floci:
        condition: service_healthy
      # The gRPC client is dialed lazily on POST /v1/orders, so "started" is
      # enough — reads and health do not need Users up.
      users:
        condition: service_started
    environment:
      - AWS_ENDPOINT_URL=http://floci:4566
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      # OTLP trace export (see Program.cs AddOpenTelemetry). Must match the
      # value the `users` service uses, so both halves of a cross-service trace
      # land in the same collector.
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      # Floci fronts the real MySQL container it launches for the Aurora-MySQL
      # cluster on its RDS proxy port (range 7000-7099), reached by the compose
      # service name `floci`. Writer and reader are the SAME endpoint locally
      # (Floci does not emulate an Aurora read replica); the split is preserved
      # in code (two URLs) so the app path matches prod (ADR-0006).
      #
      # ORDERS_DB_PORT is DISCOVERED per-engine and written into .env by
      # `make env-file`: Floci assigns proxy ports by cluster creation order,
      # which is NOT stable across applies, so postgres/mysql can flip between
      # 7001/7002 — never hardcode. The ${ORDERS_DB_PORT:-7002} default only
      # applies before .env is generated; after bootstrap the discovered value
      # wins. These are ADO.NET connection strings, not DSNs.
      # SslMode=None: Floci's emulated MySQL does not terminate TLS, so the
      # MySqlConnector default (Preferred → attempts TLS) fails at startup with
      # "unexpected EOF from the transport stream". Prod uses TLS (drop this).
      - DATABASE_WRITER_URL=Server=floci;Port=${ORDERS_DB_PORT:-7002};Database=orders;User=test;Password=test;SslMode=None;
      - DATABASE_READER_URL=Server=floci;Port=${ORDERS_DB_PORT:-7002};Database=orders;User=test;Password=test;SslMode=None;
      - USERS_GRPC_URL=http://users:50051
      # MUST equal the value on the `users` service — the interceptor compares
      # them constant-time; a mismatch yields UNAUTHENTICATED. Local-only value;
      # prod reads it from Secrets Manager (ADR-0007).
      - GRPC_API_KEY=local-dev-grpc-key
      # Apply migrations + seed the Product catalog + baseline config (tax_rate)
      # on startup (local bootstrap). The tax rate now lives in the `configuration`
      # table (was ORDERS_TAX_RATE), read per-request.
      - SEED_ON_STARTUP=true
      - E2E_TESTING_ENABLED=true
    # stdout → the observability collector's fluent_forward receiver.
    # localhost:24224 because the Docker daemon resolves fluentd-address from the
    # HOST, not this network. fluentd-async so the service still starts when the
    # observability profile (and thus the collector) is not running.
    logging:
      driver: fluentd
      options:
        fluentd-address: "localhost:24224"
        fluentd-async: "true"
        tag: "orders"
    develop:
      watch:
        # Orders is .NET (compiled): a source sync alone would copy .cs files into
        # the container but NOT recompile — the running process keeps the old DLL.
        # `rebuild` reconstructs the image on any source change so the new code
        # actually runs. Requires `docker compose watch` to be active.
        - action: rebuild
          path: ./services/orders/src

  tracking:
    build: ./services/tracking
    networks: [3mrai-network]
    depends_on:
      floci:
        condition: service_healthy
    environment:
      - AWS_ENDPOINT_URL=http://floci:4566
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    # stdout → the observability collector's fluent_forward receiver.
    # localhost:24224 because the Docker daemon resolves fluentd-address from the
    # HOST, not this network. fluentd-async so the service still starts when the
    # observability profile (and thus the collector) is not running.
    logging:
      driver: fluentd
      options:
        fluentd-address: "localhost:24224"
        fluentd-async: "true"
        tag: "tracking"
    develop:
      watch:
        - action: sync
          path: ./services/tracking/src
          target: /app/src

  events-pipeline:
    build: ./services/events-pipeline
    networks: [3mrai-network]
    depends_on:
      floci:
        condition: service_healthy
    environment:
      - AWS_ENDPOINT_URL=http://floci:4566
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    # stdout → the observability collector's fluent_forward receiver.
    # localhost:24224 because the Docker daemon resolves fluentd-address from the
    # HOST, not this network. fluentd-async so the service still starts when the
    # observability profile (and thus the collector) is not running.
    logging:
      driver: fluentd
      options:
        fluentd-address: "localhost:24224"
        fluentd-async: "true"
        tag: "events-pipeline"
    develop:
      watch:
        - action: sync
          path: ./services/events-pipeline/src
          target: /app/src
